<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stonehorn | Admin Orders</title>
    <meta name="description" content="Admin orders dashboard for Stonehorn checkout." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="section">
      <nav class="nav">
        <a href="./index.html" class="brand-lockup" aria-label="Stonehorn home">
          <img src="./archive-6.png" alt="Stonehorn logo" class="brand-logo" />
          <p class="wordmark">STONEHORN</p>
        </a>
        <div class="nav-links">
          <a href="./account.html" class="nav-tab">Account</a>
          <a href="./admin-review.html" class="nav-tab">Review Queue</a>
          <a href="./admin-orders.html" class="nav-tab is-active">Orders Dashboard</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section reveal">
        <p class="eyebrow">Orders Dashboard</p>
        <h2>Paid orders and email status.</h2>
        <div class="board-form" id="admin-auth-box">
          <label for="admin-email">Admin Email</label>
          <input id="admin-email" type="email" placeholder="admin@stonehorn.local" />
          <label for="admin-password">Admin Password</label>
          <input id="admin-password" type="password" placeholder="Enter admin password" />
          <div class="hunter-gate-actions">
            <button class="btn btn-sm" id="admin-login-btn" type="button">Login</button>
            <button class="btn btn-ghost btn-sm" id="admin-orders-refresh-btn" type="button">Refresh Orders</button>
          </div>
          <p class="small" id="admin-status"></p>
        </div>
      </section>

      <section class="section reveal">
        <div class="orders-search-wrap">
          <label class="small" for="admin-orders-search">Search by email or order number</label>
          <input
            id="admin-orders-search"
            type="search"
            placeholder="Ex: clarkmck001@gmail.com or cs_test_..."
            autocomplete="off"
          />
        </div>
        <div id="admin-orders-list" class="recent-grid orders-grid"></div>
      </section>

      <section class="section reveal">
        <p class="eyebrow">Product Drop Email List</p>
        <h2>Subscribers and broadcast updates.</h2>
        <div class="board-form">
          <div class="hunter-gate-actions">
            <button class="btn btn-ghost btn-sm" id="drops-refresh-btn" type="button">Refresh Subscriber List</button>
          </div>
          <p class="small" id="drops-count"></p>

          <label for="drops-subject">Drop Update Subject</label>
          <input id="drops-subject" type="text" placeholder="New Stonehorn drop is live" />

          <label for="drops-message">Drop Update Message</label>
          <textarea id="drops-message" rows="5" placeholder="Write the update you want sent to all subscribers."></textarea>

          <label for="drops-photo">Drop Photo (optional)</label>
          <input id="drops-photo" type="file" accept="image/*" />

          <button class="btn btn-sm" id="drops-send-btn" type="button">Send Update To All Subscribers</button>
          <p class="small" id="drops-status"></p>
        </div>
      </section>

      <section class="section reveal">
        <p class="eyebrow">Inventory Control</p>
        <h2>Manage stock and pricing in one place.</h2>
        <div class="board-form">
          <p class="small"><strong>Stock / Sold Out</strong></p>
          <div id="inventory-list"></div>
          <div class="hunter-gate-actions">
            <button class="btn btn-ghost btn-sm" id="inventory-refresh-btn" type="button">Refresh Inventory</button>
            <button class="btn btn-sm" id="inventory-save-btn" type="button">Save Inventory + Prices</button>
          </div>
          <p class="small" id="inventory-status"></p>
        </div>
      </section>

    </main>

    <script src="./script.js"></script>
  </body>
</html>
