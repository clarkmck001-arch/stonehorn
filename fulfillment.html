<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stonehorn | Fulfillment</title>
    <meta name="description" content="Worker fulfillment dashboard for Stonehorn orders." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260411c" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="section">
      <nav class="nav">
        <a href="./index.html" class="brand-lockup" aria-label="Stonehorn home">
          <img src="./archive-6.png" alt="Stonehorn logo" class="brand-logo" />
          <p class="wordmark">STONEHORN</p>
        </a>
        <div class="nav-links">
          <a href="./account.html" class="nav-tab">Account</a>
          <a href="./fulfillment.html" class="nav-tab is-active">Fulfillment</a>
          <a href="./admin-orders.html" class="nav-tab">Admin Orders</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section reveal">
        <p class="eyebrow">Fulfillment Dashboard</p>
        <h2>Pack and ship paid orders.</h2>
        <div class="board-form hidden" id="staff-notify-box">
          <div class="hunter-gate-actions">
            <p class="small" id="staff-notify-count">No new orders.</p>
            <button class="btn btn-ghost btn-sm" id="staff-notify-refresh-btn" type="button">Refresh Alerts</button>
            <button class="btn btn-sm" id="staff-notify-mark-read-btn" type="button">Mark Alerts Read</button>
            <button class="btn btn-ghost btn-sm" id="staff-notify-clear-btn" type="button">Clear Alerts</button>
          </div>
          <label class="small" for="staff-notify-desktop-toggle">
            <input id="staff-notify-desktop-toggle" type="checkbox" />
            Desktop notifications
          </label>
          <p class="small" id="staff-notify-desktop-status"></p>
          <div id="staff-notify-list"></div>
        </div>
        <div class="board-form" id="worker-auth-box">
          <label for="worker-email">Worker Email</label>
          <input id="worker-email" type="email" placeholder="worker@stonehorn.local" />
          <label for="worker-password">Worker Password</label>
          <input id="worker-password" type="password" placeholder="Enter worker password" />
          <div class="hunter-gate-actions">
            <button class="btn btn-sm" id="worker-login-btn" type="button">Login</button>
            <button class="btn btn-ghost btn-sm" id="worker-refresh-btn" type="button">Refresh Orders</button>
          </div>
          <p class="small" id="worker-status"></p>
        </div>
      </section>

      <section class="section reveal">
        <div class="hunter-gate-actions" style="margin-bottom: 0.8rem">
          <label for="worker-order-filter" class="small" style="align-self: center">Show:</label>
          <select id="worker-order-filter">
            <option value="latest">Latest 10 (Default)</option>
            <option value="open">Open (Paid + Packed)</option>
            <option value="paid">Paid (Needs Packing)</option>
            <option value="packed">Packed (Ready To Ship)</option>
            <option value="shipped">Shipped</option>
            <option value="created">Created</option>
            <option value="cancelled">Cancelled</option>
            <option value="all">All</option>
          </select>
          <p class="small" id="worker-filter-count"></p>
        </div>
        <div id="fulfillment-list" class="recent-grid orders-grid"></div>
      </section>
    </main>

    <footer class="footer">
      <div>
        <p>Stonehorn</p>
        <p>Built with grit. Worn with intent.</p>
      </div>
      <nav class="footer-links" aria-label="Legal">
        <a href="./shipping-policy.html">Shipping</a>
        <a href="./returns-policy.html">Returns</a>
        <a href="./privacy-policy.html">Privacy</a>
        <a href="./terms.html">Terms</a>
      </nav>
    </footer>

    <script src="./script.js?v=20260411g"></script>
  </body>
</html>
